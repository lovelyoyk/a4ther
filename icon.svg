<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <radialGradient id="bg" cx="50%" cy="40%" r="70%">
            <stop offset="0%" stop-color="#1c1430"/>
            <stop offset="100%" stop-color="#07060d"/>
        </radialGradient>
        <linearGradient id="text" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"  stop-color="#d4b8ff"/>
            <stop offset="100%" stop-color="#9575ff"/>
        </linearGradient>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6"/>
        </filter>
    </defs>
    <rect width="512" height="512" rx="96" fill="url(#bg)"/>
    <!-- Glow halo -->
    <text x="256" y="288" text-anchor="middle" font-family="'Orbitron','Inter',monospace" font-weight="900"
          font-size="180" fill="#b388ff" filter="url(#glow)" opacity="0.7">A4</text>
    <!-- Sharp letters on top -->
    <text x="256" y="288" text-anchor="middle" font-family="'Orbitron','Inter',monospace" font-weight="900"
          font-size="180" fill="url(#text)">A4</text>
    <!-- Subtitle -->
    <text x="256" y="368" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-weight="700"
          font-size="38" letter-spacing="4" fill="#9575ff">THER</text>
</svg>
